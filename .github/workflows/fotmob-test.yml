name: fotmob-api-test
# Temporary one-off test: verify FotMob /api/data/* is reachable keyless
# from a GitHub Actions runner (datacenter IP, default curl user-agent).
# Safe to delete.
on: workflow_dispatch
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Show runner egress IP
        run: curl -s https://api.ipify.org; echo
      - name: matchDetails (plain curl, no headers)
        run: |
          code=$(curl -s -o /tmp/md.json -w '%{http_code}' 'https://www.fotmob.com/api/data/matchDetails?matchId=4667751')
          echo "HTTP $code  bytes=$(wc -c < /tmp/md.json)"
          python3 -c "import json;d=json.load(open('/tmp/md.json'));p=d['content']['matchFacts']['playerOfTheMatch'];print('PotM:',p['name'],'rating:',p['rating']);s=d['content']['playerStats'][str(p['id'])]['stats'][0]['stats'];print({k:v['stat'].get('value') for k,v in list(s.items())[:9]})"
      - name: leagues fixtures (WC2026 = id 77)
        run: |
          code=$(curl -s -o /tmp/lg.json -w '%{http_code}' 'https://www.fotmob.com/api/data/leagues?id=77&tab=matches')
          echo "HTTP $code  bytes=$(wc -c < /tmp/lg.json)"
          head -c 250 /tmp/lg.json; echo
      - name: daily matches
        run: |
          code=$(curl -s -o /tmp/dm.json -w '%{http_code}' 'https://www.fotmob.com/api/data/matches?date=20260611')
          echo "HTTP $code  bytes=$(wc -c < /tmp/dm.json)"
          head -c 250 /tmp/dm.json; echo
      - name: old /api/leagues path (token caveat check)
        run: |
          code=$(curl -s -o /tmp/old.json -w '%{http_code}' 'https://www.fotmob.com/api/leagues?id=77&tab=matches')
          echo "HTTP $code  bytes=$(wc -c < /tmp/old.json)"
          head -c 250 /tmp/old.json; echo
