name: sync-fantasy-data

# Runs entirely on GitHub's servers — your computer can be off.
# Pulls TV 2 squad/players/league + betting odds, commits them; Streamlit Cloud
# redeploys automatically and recomputes projections from the new data.
# The site ALSO fetches live league scores directly (every 2 min) when the
# TV2_TOKEN secret is set in Streamlit — this workflow is the durable record
# plus the autopilot's data source.

on:
  schedule:
    # baseline every 6h; hourly during the match window (matches run ~15:00-05:00 UTC
    # in North America) so league scores, player points and live results stay fresh
    - cron: "0 6,12 * * *"
    - cron: "0 15-23 * * *"
    - cron: "0 0-5 * * *"
  workflow_dispatch:          # lets you run it on demand from the Actions tab

permissions:
  contents: write             # allow the job to commit the refreshed data back

concurrency:
  group: sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps (no browser needed in token mode)
        run: pip install --quiet pandas numpy requests

      - name: Configure git
        run: |
          git config user.name "vm-fantasy-bot"
          git config user.email "actions@users.noreply.github.com"

      - name: Warn if the TV 2 token is near expiry
        env:
          TV2_TOKEN: ${{ secrets.TV2_TOKEN }}
        run: python scraper/check_token.py || true

      - name: Sync TV 2 data + odds + player props and push
        env:
          TV2_TOKEN: ${{ secrets.TV2_TOKEN }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python scraper/sync.py --outrights --props

      # Autopilot: when a transfer deadline is within 8 hours, applies the
      # optimizer's best transfers + lineup + captain directly to the TV 2
      # team (verified after writing). Outside that window it does nothing.
      - name: Autopilot transfers near deadline
        env:
          TV2_TOKEN: ${{ secrets.TV2_TOKEN }}
        run: python scraper/autopilot.py --confirm

      # If the autopilot changed the team, immediately re-sync so the website
      # shows the squad that is actually on TV 2 — site and actions move
      # together. Not --skip-odds: this also stages any odds the autopilot
      # force-refreshed for its decision (refresh_odds self-throttles).
      - name: Re-sync after autopilot so the site matches the applied team
        env:
          TV2_TOKEN: ${{ secrets.TV2_TOKEN }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python scraper/sync.py
