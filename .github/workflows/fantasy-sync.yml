name: sync-fantasy-data

# Runs entirely on GitHub's servers — your computer can be off.
# Pulls TV 2 squad/players + betting odds, commits them; Streamlit Cloud
# redeploys automatically and recomputes projections from the new data.

on:
  schedule:
    - cron: "0 0,6,12,15,18 * * *"  # every 6h + extra runs at 15/18 UTC so the autopilot always fires inside its pre-deadline window (TV 2 deadlines are typically 19-22 UTC)
  workflow_dispatch:          # lets you run it on demand from the Actions tab

permissions:
  contents: write             # allow the job to commit the refreshed data back

concurrency:
  group: sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps (no browser needed in token mode)
        run: pip install --quiet pandas numpy requests

      - name: Configure git
        run: |
          git config user.name "vm-fantasy-bot"
          git config user.email "actions@users.noreply.github.com"

      - name: Sync TV 2 data + odds and push
        env:
          TV2_TOKEN: ${{ secrets.TV2_TOKEN }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python scraper/sync.py --outrights

      # Autopilot: when a transfer deadline is within 8 hours, applies the
      # optimizer's best transfers + lineup + captain directly to the TV 2
      # team (verified after writing). Outside that window it does nothing.
      - name: Autopilot transfers near deadline
        env:
          TV2_TOKEN: ${{ secrets.TV2_TOKEN }}
        run: python scraper/autopilot.py --confirm
