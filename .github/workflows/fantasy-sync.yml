name: sync-fantasy-data

# Runs entirely on GitHub's servers — your computer can be off.
# Pulls TV 2 squad/players/league + betting odds, commits them; Streamlit Cloud
# redeploys automatically and recomputes projections from the new data.
# The site ALSO fetches live league scores directly (every 2 min) when the
# TV2_TOKEN secret is set in Streamlit — this workflow is the durable record
# plus the autopilot's data source.

on:
  schedule:
    # baseline every 6h; every 30 min during the match window (matches run ~15:00-05:00
    # UTC in North America) so league scores / player points / live results stay fresh.
    # GitHub's scheduler is best-effort (it delays/skips under load), so two entries per
    # hour raise the odds one fires; LIVE standings also refresh via the TV2 token on each
    # page load, independent of this sync.
    - cron: "0 6,12 * * *"
    - cron: "0,30 15-23 * * *"
    - cron: "0,30 0-5 * * *"
  workflow_dispatch:          # lets you run it on demand from the Actions tab

permissions:
  contents: write             # allow the job to commit the refreshed data back

concurrency:
  group: sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps (no browser needed in token mode)
        run: pip install --quiet pandas numpy requests

      - name: Configure git
        run: |
          git config user.name "vm-fantasy-bot"
          git config user.email "actions@users.noreply.github.com"

      - name: Warn if the TV 2 token is near expiry
        env:
          TV2_TOKEN: ${{ secrets.TV2_TOKEN }}
        run: python scraper/check_token.py || true

      - name: Sync TV 2 data + odds + player props and push
        continue-on-error: true        # a bad-payload exit or a push race must NOT skip the
                                        # deadline autopilot below — it re-fetches its own live
                                        # data and force-refreshes odds, so it runs fine regardless
        env:
          TV2_TOKEN: ${{ secrets.TV2_TOKEN }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python scraper/sync.py --outrights --props

      # Post-match enrichment: FotMob per-player minutes/rating/xG for finished
      # games (free, keyless) -> sharper start-probability + form. Best-effort.
      - name: Enrich finished matches with FotMob stats
        continue-on-error: true        # best-effort: never block the autopilot
        run: |
          python scraper/enrich_stats.py || echo "enrichment failed - skipping"
          if [ -f data/tv2/player_stats.json ]; then git add data/tv2/player_stats.json; fi
          git diff --cached --quiet || (git commit -m "stats enrichment $(date -u +%FT%H:%MZ)" && git push)

      # Daily rating snapshot + self-tuning calibration. Best-effort; the learned
      # files only exist once there's data, so add only the ones that are present.
      - name: Record daily team-rating history
        continue-on-error: true
        run: |
          python scraper/record_rating.py || echo "rating snapshot failed - skipping"
          for f in data/tv2/rating_history.json data/tv2/model_accuracy.json \
                   data/tv2/calibration.json data/tv2/motm_calibration.json; do
            if [ -f "$f" ]; then git add "$f"; fi
          done
          git diff --cached --quiet || (git commit -m "rating snapshot $(date -u +%F)" && git push)

      # Pre-deadline lineup signal: FotMob predicted/confirmed XIs for the
      # imminent round -> override start probabilities so the autopilot never
      # captains/fields a benched or injured player. Best-effort, runs right
      # before the autopilot so it acts on the freshest XIs.
      - name: Enrich predicted/confirmed lineups
        continue-on-error: true
        run: |
          python scraper/enrich_lineups.py || echo "lineup enrichment failed - skipping"
          if [ -f data/tv2/predicted_lineups.json ]; then git add data/tv2/predicted_lineups.json; fi
          git diff --cached --quiet || (git commit -m "lineups $(date -u +%FT%H:%MZ)" && git push)

      # Autopilot: when a transfer deadline is within 8 hours, applies the
      # optimizer's best transfers + lineup + captain directly to the TV 2
      # team (verified after writing). Outside that window it does nothing.
      - name: Autopilot transfers near deadline
        env:
          TV2_TOKEN: ${{ secrets.TV2_TOKEN }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}   # so the autopilot's pre-decision force-refresh works
        run: python scraper/autopilot.py --confirm

      # If the autopilot changed the team, immediately re-sync so the website
      # shows the squad that is actually on TV 2 — site and actions move
      # together. Not --skip-odds: this also stages any odds the autopilot
      # force-refreshed for its decision (refresh_odds self-throttles).
      - name: Re-sync after autopilot so the site matches the applied team
        env:
          TV2_TOKEN: ${{ secrets.TV2_TOKEN }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python scraper/sync.py
