name: fifa-probe
# Temporary one-off probe: verifies api.fifa.com is reachable keyless from a
# GitHub Actions datacenter IP. Deleted right after the run.
on: workflow_dispatch
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe FIFA API from runner
        run: |
          echo "== runner egress IP =="
          curl -s https://api.ipify.org || true
          echo
          echo "== calendar endpoint =="
          curl -s -o cal.json -w 'HTTP %{http_code}, %{size_download} bytes\n' "https://api.fifa.com/api/v3/calendar/matches?from=2026-06-11T00:00:00Z&to=2026-06-13T00:00:00Z&language=en&count=500"
          echo "WC2026 matches in window:"
          jq -r '.Results[] | select(.IdCompetition=="17") | [.IdSeason,.IdStage,.IdMatch,.Home.TeamName[0].Description,.Away.TeamName[0].Description,.Date] | @tsv' cal.json || head -c 300 cal.json
          echo "== live match endpoint (17/285023/289273/400021443) =="
          curl -s -D live_headers.txt -o live.json -w 'HTTP %{http_code}, %{size_download} bytes\n' "https://api.fifa.com/api/v3/live/football/17/285023/289273/400021443"
          grep -i -E 'akamai|server|cache' live_headers.txt || true
          echo "IDs:"
          jq -r '[.IdCompetition,.IdSeason,.IdStage,.IdMatch] | @tsv' live.json || head -c 300 live.json
          echo "Score and status:"
          jq -r '[.HomeTeam.TeamName[0].Description, (.HomeTeam.Score|tostring), (.AwayTeam.Score|tostring), .AwayTeam.TeamName[0].Description, (.MatchStatus|tostring)] | @tsv' live.json || true
          echo "Home starters / bench:"
          jq -r '.HomeTeam.Players | (map(select(.Status==1))|length|tostring) + " starters, " + (map(select(.Status==2))|length|tostring) + " bench"' live.json || true
          echo "Captain:"
          jq -r '.HomeTeam.Players[] | select(.Captain==true) | .PlayerName[0].Description' live.json || true
          echo "Goal minutes:"
          jq -r '.HomeTeam.Goals[] | [.IdPlayer, .Minute] | @tsv' live.json || true
